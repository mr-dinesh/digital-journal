baseURL = "https://mrdee.in/"
languageCode = "en-us"
title = "Dee's Digest"
theme = "PaperMod"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  description = "Daily Notes"
  author = "Mr.Dee"

  ShowReadingTime = true
  ShowCodeCopyButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowToc = true
  TocOpen = false

  defaultTheme = "auto"

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/mr-dinesh"

[[params.socialIcons]]
  name = "mastodon"
  url = "https://infosec.exchange/@mrd"

[[params.socialIcons]]
  name = "twitter"
  url = "https://x.com/m_r_dinesh"

[[params.socialIcons]]
  name = "linkedin"
  url = "https://www.linkedin.com/in/dinesh-mr"

[[params.socialIcons]]
  name = "rss"
  url = "/index.xml"

[menu]
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 0

  [[menu.main]]
    name = "Notes"
    url = "/curl-notes/"
    weight = 1

  [[menu.main]]
    name = "Reading"
    url = "/reading/"
    weight = 2

  [[menu.main]]
    name = "Writing"
    url = "/writing/"
    weight = 3
