baseURL = "https://mrdee.in/"
languageCode = "en"
title = "Dinesh's Digital Journal"
theme = "congo"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true
  minifyOutput = true

[params]
  description = "Daily Notes"
  colorScheme = "ocean"
  defaultAppearance = "auto"
  autoSwitchAppearance = true
  enableSearch = true
  enableCodeCopy = true

  [params.author]
    name = "Mr.Dee"
    links = [
      { github = "https://github.com/mr-dinesh" },
      { mastodon = "https://infosec.exchange/@mrd" },
      { x-twitter = "https://x.com/m_r_dinesh" },
      { linkedin = "https://www.linkedin.com/in/dinesh-mr" },
      { rss = "/index.xml" },
    ]

  [params.homepage]
    layout = "page"
    showRecent = true
    recentLimit = 5

  [params.article]
    showDate = true
    showAuthor = false
    showBreadcrumbs = true
    showReadingTime = true
    showTableOfContents = true
    showPagination = true
    showHeadingAnchors = true

  [params.list]
    showSummary = true
    showBreadcrumbs = true
    groupByYear = false

  [params.footer]
    showCopyright = false
    showThemeAttribution = false
    showAppearanceSwitcher = true
    showScrollToTop = true

[menu]
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 0

  [[menu.main]]
    name = "Notes"
    url = "/curl-notes/"
    weight = 1

  [[menu.main]]
    name = "Reading"
    url = "/reading/"
    weight = 2

  [[menu.main]]
    name = "Writing"
    url = "/writing/"
    weight = 3
